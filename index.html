<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enta Kol Haga Leena — Original Song by Abu Sayed</title>
    <meta name="description" content="Official lyrics for 'Enta Kol Haga Leena', an original song by Abu Sayed. Explore the storytelling and emotions of this unique composition.">
    <meta name="keywords" content="lyric, songwriter, lyricist, composer, artist, musician, music-producer, Abu Sayed, Enta Kol Haga Leena">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --accent-color: #58a6ff;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --heading-color: #ffffff;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s ease;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--heading-color);
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }
        .artist {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            color: var(--accent-color);
            font-size: 0.9rem;
        }
        .lyrics {
            font-size: 1.15rem;
            white-space: pre-wrap;
            color: var(--text-main);
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 1s ease-out;
        }
        footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 30px;
        }
        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: opacity 0.2s;
        }
        a:hover {
            opacity: 0.8;
        }
        .social-links {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 600px) {
            .container { padding: 25px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">

            <div class="social-links">

                <a href="https://music.abusayed.com.bd">Music</a>
                <a href="https://github.com/ImAbuSayed">GitHub</a>
            </div>
        </footer>
    </div>
</body>
</html>
